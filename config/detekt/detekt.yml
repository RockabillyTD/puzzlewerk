# Projekt-Overrides über der Detekt-Default-Konfiguration
# (buildUponDefaultConfig = true). Regeln C4/C5 aus docs/architektur.md.

complexity:
  CyclomaticComplexMethod:
    threshold: 10
  LongMethod:
    threshold: 30
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 7
    # Options-Parameter mit Defaults (Compose-Slot-Idiom) zählen nicht —
    # Review-Empfehlung PW-4.5, ersetzt punktuelle @Suppress.
    ignoreDefaultParameters: true
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15

naming:
  # Compose-Konvention: Composables sind PascalCase — von der
  # camelCase-Funktionsnamen-Regel ausnehmen (Fix für Phase-0-Erstlauf).
  FunctionNaming:
    ignoreAnnotated: ['Composable']

style:
  UnusedPrivateMember:
    ignoreAnnotated: ['Preview']
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true
  ReturnCount:
    max: 3
  ForbiddenComment:
    comments:
      - reason: 'TODO nur mit Issue-Referenz erlaubt, z. B. TODO(#42)'
        value: 'TODO:'
