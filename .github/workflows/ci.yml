# CI-Pipeline — Quality Gates aus docs/architektur.md.
# Actions sind auf Commit-SHAs gepinnt (Regel S6 / Release-Engineer-Regel 4).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: JDK 17 einrichten
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle einrichten (mit Cache)
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Formatierung (Ktlint)
        run: ./gradlew ktlintCheck

      - name: Statische Analyse (Detekt)
        run: ./gradlew detekt

      - name: Unit-Tests
        run: ./gradlew test

      - name: Coverage-Gates (Kover)
        run: ./gradlew koverVerify

      - name: Android Lint + Debug-Build
        run: ./gradlew :app:lintDebug :app:assembleDebug

      - name: Testberichte archivieren
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
            **/build/reports/ktlint/
